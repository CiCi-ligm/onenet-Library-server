<SCRIPT language=javascript>
//检验表单的合法性
function checklogin() {
	if (document.loginform.username.value.replace(/\s+$|^\s+/g,"").length<=0||document.loginform.username.value=="Your Name") {
		alert("\请输入您的帐号！");
		document.loginform.username.focus();
		return false;
	}
	if (document.loginform.password.value.replace(/\s+$|^\s+/g,"").length<=0||document.loginform.password.value=="Password") {
		alert("\请输入您的密码！");
		document.loginform.password.focus();
		return false;
	} 
}

function checkUser(){
	alert("\您的密码输入错误，请核对后重新输入！");
}
